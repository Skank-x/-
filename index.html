        @keyframes float {
          0%, 100% { transform: translateY(0) scale(1); }
          50% { transform: translateY(-20px) scale(1.05); }
        }
        @keyframes fadeUpStagger {
          from { opacity: 0; transform: translateY(30px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
          animation: fadeUpStagger 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
          opacity: 0;
        }
        .glass-heavy {
            backdrop-filter: blur(24px) saturate(150%);

        }
        .blend-multiply { mix-blend-mode: multiply; }
        .blend-screen { mix-blend-mode: screen; }
        
        .pin-bounce { animation: pinBounce 2s infinite; }
        @keyframes pinBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .prose strong { color: #638ECB; font-weight: 800; }
        .prose ul { list-style-type: disc; margin-right: 1.5rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }

                        </div>
                    </div>
                </div>

                <div class="animate-in slide-in-from-bottom-8 duration-700 delay-200 w-full">
                    <div class="border rounded-2xl p-5 flex items-center justify-between shadow-lg ${state.isDark ? `border-white/5 bg-gradient-to-r from-[${C.cardDark}] to-[${C.bgDark}]` : `border-[${C.borderLight}] bg-white`}">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-black rounded-full flex items-center justify-center border-2 border-[${C.primary}] p-1 relative">
                                <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(p.agent.name)}&background=152033&color=638ECB" class="w-full h-full rounded-full" />
                            </div>
                            <div>
                                <div class="flex items-center gap-1.5 mb-1">
                                    <h4 class="font-bold text-base ${theme.textMain}">${p.agent.name}</h4>
                                    ${p.agent.verified ? '<i data-lucide="check-circle-2" class="w-4 h-4 text-[#10B981]"></i>' : ''}
                                </div>
                                <div class="flex items-center gap-1 text-xs font-medium ${theme.textMuted}">
                                    <i data-lucide="shield-check" class="w-3.5 h-3.5 text-[${C.primary}]"></i><span>${t('verifiedAgent')}</span>
                                </div>
                            </div>
                        </div>
                        <div class="p-2 rounded-xl text-center border ${state.isDark ? 'bg-white/5 border-white/5' : `bg-gray-50 border-[${C.borderLight}]`}">
                            <span class="flex items-center gap-1 text-sm font-bold ${theme.textMain}"><i data-lucide="star" class="w-3 h-3 text-yellow-500 fill-yellow-500"></i> ${p.agent.rate}</span>
                        </div>
                    </div>
                </div>
                
                <div class="animate-in slide-in-from-bottom-8 duration-700 delay-300 w-full">
                    <h3 class="text-xl font-bold mb-4 ${theme.textMain}">${t('propertyDetails')}</h3>
                    <p class="text-sm leading-loose ${theme.textMuted}">${t('description')}</p>
                </div>

                ${recommendedHTML}

            </main>
            `;
        };

        const renderApp = () => {
            const theme = getTheme();
            document.body.className = `${theme.bgMain} ${theme.textMain} transition-colors duration-500 min-h-screen flex flex-col m-0 p-0`;
            
            const app = document.getElementById('app');
            app.innerHTML = `
                ${renderAmbientGlow()}
                ${!state.selectedPropertyId ? renderHeader(theme) : ''}
                ${!state.selectedPropertyId ? renderHome() : renderPropertyDetails()}
                ${renderFooter(theme)}
                ${renderChatbot()}
                ${renderCompareModal(theme)}
            `;
            
            lucide.createIcons();

            const target = document.getElementById('dock-target');
            const content = document.getElementById('dock-content');
            if(target && content) {
                window.onscroll = () => {
                    const rect = target.getBoundingClientRect();
                    if(rect.top <= window.innerHeight - 24) content.className = "relative transition-all duration-100 z-50";
                    else content.className = "fixed bottom-6 left-4 sm:left-6 right-4 sm:right-6 max-w-4xl mx-auto transition-all duration-100 z-50";
                };
                window.onscroll(); 
            } else {
                window.onscroll = null;
            }
        };

        // --- Init ---
        renderApp();
    </script>
</body>
</html>
