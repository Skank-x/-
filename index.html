<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سكنك | Saknk Real Estate</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#638ECB">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes float {
          0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
          50% { transform: translate3d(0, -20px, 0) scale(1.05); }
        }
        
        @keyframes fadeUpStagger {
          from { opacity: 0; transform: translate3d(0, 20px, 0); }
          to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        
        .animate-fade-up {
          animation: fadeUpStagger 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
          opacity: 0;
          will-change: transform, opacity;
        }
        
        @keyframes pinBounce {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(0, -10px, 0); }
        }
        .pin-bounce { animation: pinBounce 2s infinite; }
        
        .fade-out {
            opacity: 0;
            transform: translate3d(-50%, -20px, 0) !important;
            transition: all 0.3s ease-out;
        }
        
        .prose strong { color: #638ECB; font-weight: 800; }
        .prose ul { list-style-type: disc; margin-right: 1.5rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .prose li { margin-bottom: 0.25rem; }
    </style>
</head>
<body class="bg-[#F0F3FA] text-gray-900 transition-colors duration-500 min-h-screen flex flex-col m-0 p-0">

    <div id="app" class="flex-1 flex flex-col w-full"></div>

    <script>
        // --- 1. Supabase Initialization ---
        const SUPABASE_URL = 'https://owujdnfxdzxzmscierta.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_leOJX_sQU1-HQKDcNTpHmw_j8CIMC4C';
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.error("Supabase Init Error:", e);
        }

        // --- 2. Constants & Styling ---
        const C = {
            bgLight: '#F0F3FA', borderLight: '#D5DEEF', softBlue: '#B1C9EF', 
            midBlue: '#8AAEE0', primary: '#638ECB', darkBlue: '#395886',
            bgDark: '#0b1221', cardDark: '#152033'  
        };
        
        const mainLogoUrl = "https://i.postimg.cc/J7XDkQcR/1000140986-removebg-preview.png"; 

        // --- 3. Translations ---
        const translations = {
            ar: {
                appName: "سكنك", login: "إنشاء حساب", changeLang: "تغيير اللغة", arabic: "العربية", english: "English",
                newDemo: "ديمو الجديدة", oldDemo: "ديمو القديمة", newDemoTitle: "عقارات ديمو الجديدة", oldDemoTitle: "عقارات ديمو القديمة",
                choosePhase: "اختر المرحلة", all: "الكل", phase1: "الأولى", phase2: "الثانية", phase3: "الثالثة", phase4: "الرابعة",
                featured: "مميز", beds: "غرف", baths: "حمامات", area: "متر",
                ref: "رقم مرجعي", location: "الموقع", amenities: "المرافق", verifiedAgent: "وكيل معتمد", propertyDetails: "تفاصيل العقار",
                neighborhood: "الأماكن القريبة", description: "اكتشف الفخامة في هذا العقار الرائع المصمم لتلبية أرقى معايير الحياة العصرية. يتميز بتشطيبات راقية، وموقع استراتيجي يضمن لك الراحة والهدوء.",
                recommended: "عقارات مميزة", whatsapp: "واتساب", callNow: "إتصل الآن", gender_male: "سكن طلاب", gender_female: "سكن طالبات",
                gender_family: "سكن عائلات", occupants: "أفراد", contactUs: "تواصل معنا", contactDesc: "نحن هنا لمساعدتك في إيجاد سكنك المثالي أو عرض عقارك.",
                name: "الاسم بالكامل", phone: "رقم الواتساب", iAm: "أنا...", tenant: "مستأجر / طالب", owner: "مؤجر / صاحب عقار", desiredPhase: "المرحلة المطلوبة",
                userType: "صفتي", landlord: "مالك العقار", broker: "سمسار", send: "إرسال الطلب", favorites: "المفضلة",
                noFavoritesTitle: "قائمتك فارغة", toastFavAdd: "تمت الإضافة للمفضلة بنجاح 🤍", toastFavRemove: "تم الإزالة من المفضلة", toastFormSuccess: "تم إرسال طلبك بنجاح ✅",
                tour360: "جولة 360°", availableBed: "متاح سرير بـ", perPerson: "للفرد", 
                addToHome: "أضف سكنك للشاشة", addToHomeDesc: "للوصول السريع وتجربة تشبه التطبيق", addToHomeBtn: "إضافة",
                loading: "جاري تحميل العقارات...",
                errorLoading: "حدث خطأ في تحميل البيانات",
                noProperties: "لا توجد عقارات مطابقة حالياً"
            },
            en: {
                appName: "Saknk", login: "Sign up", changeLang: "Change Language", arabic: "العربية", english: "English",
                newDemo: "New Demo", oldDemo: "Old Demo", newDemoTitle: "New Demo Properties", oldDemoTitle: "Old Demo Properties",
                choosePhase: "Choose Phase", all: "All", phase1: "First", phase2: "Second", phase3: "Third", phase4: "Fourth",
                featured: "Featured", beds: "Beds", baths: "Baths", area: "SQM",
                ref: "Ref", location: "Location", amenities: "Amenities", verifiedAgent: "Verified Agent", propertyDetails: "Property Details",
                neighborhood: "Neighborhood", description: "Discover luxury in this exquisite property designed to meet the highest standards of modern living. Featuring premium finishes and a strategic location.",
                recommended: "Featured Properties", whatsapp: "WhatsApp", callNow: "Call Now", gender_male: "Male Students", gender_female: "Female Students",
                gender_family: "Families", occupants: "Persons", contactUs: "Contact Us", contactDesc: "We are here to help you find your perfect home.",
                name: "Full Name", phone: "WhatsApp", iAm: "I am a...", tenant: "Tenant / Student", owner: "Landlord", desiredPhase: "Desired Phase",
                userType: "My Role", landlord: "Property Owner", broker: "Broker", send: "Submit Request", favorites: "Favorites",
                noFavoritesTitle: "Your List is Empty", toastFavAdd: "Added to favorites 🤍", toastFavRemove: "Removed from favorites", toastFormSuccess: "Request sent successfully ✅",
                tour360: "360° Tour", availableBed: "Bed available for", perPerson: "per person", 
                addToHome: "Add to Home Screen", addToHomeDesc: "For fast access and app-like experience", addToHomeBtn: "Add",
                loading: "Loading properties...",
                errorLoading: "Error loading data",
                noProperties: "No matching properties currently"
            }
        };

        // --- 4. Global State & Data ---
        let properties = []; // سيتم سحبها من قاعدة البيانات
        
        let state = {
            isLoading: true, 
            hasError: false,
            isDark: false, 
            lang: 'ar',
            activeLocation: 'newDemo',
            activePhase: 'all',
            viewMode: 'grid', 
            showFavorites: false,
            favorites: [],
            selectedPropertyId: null,
            activePinId: null,
            isChatOpen: false,
            chatMessages: [],
            isBotTyping: false,
            contactType: 'tenant',
            imageIndex: 0,
            showPwaPrompt: true 
        };

        // --- PWA Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed', err));
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            state.showPwaPrompt = true;
            renderApp();
        });

        window.installApp = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') console.log('User accepted the install prompt');
                deferredPrompt = null;
            }
            state.showPwaPrompt = false;
            renderApp();
        };

        // --- Hardware Back Button Logic ---
        window.addEventListener('popstate', (e) => {
            if (state.selectedPropertyId) {
                state.selectedPropertyId = null;
                renderApp();
            } else if (state.isChatOpen) {
                state.isChatOpen = false;
                renderApp();
            }
        });

        // --- Helper Functions ---
        const t = (key) => translations[state.lang][key] || key;
        
        const getTheme = () => {
            if (state.isDark) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');

            return {
                bgMain: state.isDark ? `bg-[${C.bgDark}]` : `bg-[${C.bgLight}]`,
                textMain: state.isDark ? `text-[${C.bgLight}]` : `text-[${C.bgDark}]`,
                textMuted: state.isDark ? `text-[${C.softBlue}]` : `text-[${C.darkBlue}]/70`,
                cardBg: state.isDark ? `bg-[${C.cardDark}]/80 border border-[${C.darkBlue}]/30 shadow-2xl` : `bg-white/90 border border-[${C.borderLight}] shadow-xl`,
                blurBg: state.isDark ? `bg-[${C.cardDark}]/60 backdrop-blur-xl border-white/10` : `bg-white/60 backdrop-blur-xl border-white/50`,
                btnBg: state.isDark ? `bg-[${C.darkBlue}]/30 hover:bg-[${C.darkBlue}]/50 border border-transparent` : `bg-[${C.borderLight}]/50 hover:bg-[${C.softBlue}]/50 border border-[${C.borderLight}]/50`,
                inputBg: state.isDark ? `bg-[${C.bgDark}]/50 border-[${C.darkBlue}]/50 text-white focus:border-[${C.primary}]` : `bg-white border-[${C.borderLight}] text-[${C.bgDark}] focus:border-[${C.primary}]`,
                inputWrapperBg: state.isDark ? `bg-[${C.bgDark}]/50 border-[${C.darkBlue}]/50 text-white focus-within:border-[${C.primary}]` : `bg-white border-[${C.borderLight}] text-[${C.bgDark}] focus-within:border-[${C.primary}]`
            };
        };

        const getFeatureIcon = (feature) => {
            if(!feature) return 'check-circle-2';
            const f = feature.toLowerCase();
            if(f.includes('واي فاي') || f.includes('wi-fi')) return 'wifi';
            if(f.includes('تكييف') || f.includes('ac')) return 'wind';
            if(f.includes('غسالة') || f.includes('washing')) return 'shirt';
            if(f.includes('مطبخ') || f.includes('kitchen')) return 'utensils';
            if(f.includes('رياضية') || f.includes('gym')) return 'dumbbell';
            if(f.includes('سيارات') || f.includes('parking')) return 'car-front';
            if(f.includes('أمن') || f.includes('security')) return 'shield';
            if(f.includes('حديقة') || f.includes('garden')) return 'trees';
            return 'check-circle-2';
        };

        const showToast = (msg) => {
            const toast = document.createElement('div');
            toast.className = `fixed top-24 left-1/2 -translate-x-1/2 z-[200] ${state.isDark ? `bg-[${C.cardDark}]/80 text-white` : 'bg-white/80 text-black'} backdrop-blur-lg border border-[${C.primary}]/50 px-6 py-3.5 rounded-2xl font-bold shadow-lg animate-in slide-in-from-top-10 fade-in duration-300 flex items-center gap-2 whitespace-nowrap`;
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => { toast.classList.add('fade-out'); setTimeout(() => toast.remove(), 300); }, 3000);
        };

        const formatMessage = (text) => text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>');

        // --- Actions & Mutations ---
        window.toggleTheme = () => { state.isDark = !state.isDark; renderApp(); };
        window.toggleLang = () => { state.lang = state.lang === 'ar' ? 'en' : 'ar'; document.dir = state.lang === 'ar' ? 'rtl' : 'ltr'; renderApp(); };
        window.setLocation = (loc) => { state.activeLocation = loc; if(loc !== 'newDemo') state.activePhase = 'all'; renderApp(); };
        window.setPhase = (phase) => { state.activePhase = phase; renderApp(); };
        window.setViewMode = (mode) => { state.viewMode = mode; renderApp(); };
        window.toggleShowFavs = () => { state.showFavorites = !state.showFavorites; renderApp(); };
        window.dismissPwa = () => { state.showPwaPrompt = false; renderApp(); };
        
        window.navigateToProperty = (id) => {
            window.history.pushState({ page: 'property' }, 'Property Details');
            state.selectedPropertyId = id;
            state.imageIndex = 0;
            window.scrollTo(0,0);
            renderApp();
        };

        window.navigateHome = () => {
            if(window.history.state !== null) window.history.back();
            else { state.selectedPropertyId = null; window.scrollTo(0,0); renderApp(); }
        };

        window.toggleFav = (id, e) => {
            if(e) e.stopPropagation();
            if(state.favorites.includes(id)) { state.favorites = state.favorites.filter(f => f !== id); showToast(t('toastFavRemove')); } 
            else { state.favorites.push(id); showToast(t('toastFavAdd')); }
            renderApp();
        };

        window.setContactType = (type) => { state.contactType = type; renderApp(); };
        window.nextImage = (e, len) => { e.stopPropagation(); state.imageIndex = (state.imageIndex + 1) % len; renderApp(); };
        window.prevImage = (e, len) => { e.stopPropagation(); state.imageIndex = state.imageIndex === 0 ? len - 1 : state.imageIndex - 1; renderApp(); };
        window.setActivePin = (id) => { state.activePinId = state.activePinId === id ? null : id; renderApp(); };

        // --- Data Fetching from Supabase ---
        async function fetchProperties() {
            if (!supabase) {
                state.isLoading = false;
                state.hasError = true;
                renderApp();
                return;
            }

            try {
                const { data, error } = await supabase.from('properties').select('*').order('id', { ascending: false });
                
                if (error) throw error;
                
                if (data) {
                    properties = data;
                }
            } catch (error) {
                console.error("Error fetching properties:", error.message);
                state.hasError = true;
                showToast(t('errorLoading'));
            } finally {
                state.isLoading = false;
                renderApp();
            }
        }

        // --- Submit Form to Supabase ---
        window.submitForm = async (e) => {
            e.preventDefault();
            if (!supabase) return showToast('Database connection error');

            const form = e.target;
            const name = form.querySelector('input[type="text"]').value;
            const phone = form.querySelector('input[type="tel"]').value;
            const select = form.querySelector('select').value;
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = state.lang === 'ar' ? 'جاري الإرسال...' : 'Sending...';
            submitBtn.disabled = true;

            try {
                const { error } = await supabase
                    .from('contact_requests')
                    .insert([{ 
                        name: name, 
                        phone: phone, 
                        user_type: state.contactType, 
                        desired_phase: select 
                    }]);

                if (error) throw error;
                showToast(t('toastFormSuccess'));
                form.reset();
            } catch (error) {
                console.error("Error submitting form:", error.message);
                showToast(state.lang === 'ar' ? 'حدث خطأ أثناء الإرسال ❌' : 'Error sending request ❌');
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        };

        // --- Chatbot Logic ---
        window.toggleChat = () => { 
            state.isChatOpen = !state.isChatOpen; 
            if(state.isChatOpen) {
                window.history.pushState({ page: 'chat' }, 'Chat');
                if(state.chatMessages.length === 0) {
                    state.chatMessages = [{ sender: 'ai', text: state.lang === 'ar' ? 'أهلاً بك في سكنك! 🤖 أنا المساعد الذكي، كيف يمكنني مساعدتك؟' : 'Welcome to Saknk! 🤖 I am your AI assistant.' }];
                }
            } else { if(window.history.state !== null) window.history.back(); }
            renderApp(); 
            setTimeout(() => { const el = document.getElementById('chat-messages'); if(el) el.scrollTop = el.scrollHeight; }, 50);
        };
        
        window.closeChat = () => { if(window.history.state !== null) window.history.back(); else { state.isChatOpen = false; renderApp(); } };
        
        window.sendChatMessage = (e, textOverride) => {
            if(e) e.preventDefault();
            const inputEl = document.getElementById('chatInputObj');
            const text = textOverride || (inputEl ? inputEl.value : '');
            if(!text.trim() || state.isBotTyping) return;
            
            state.chatMessages.push({ sender: 'user', text });
            state.isBotTyping = true;
            renderApp();
            
            setTimeout(() => { const el = document.getElementById('chat-messages'); if(el) el.scrollTop = el.scrollHeight; }, 50);
            
            setTimeout(() => {
                let query = text.toLowerCase();
                let reply = state.lang === 'ar' ? 'شكراً لاستفسارك! سأقوم بتحويل طلبك لأحد وكلائنا 🏡' : 'Thanks! I will forward your request 🏡';
                if (query.includes('طالب') || query.includes('student')) reply = state.lang === 'ar' ? 'لدينا خيارات ممتازة لسكن الطلاب! تصفح العقارات.' : 'We have great options for student housing!';
                if (query.includes('سعر') || query.includes('cheap') || query.includes('رخيص')) reply = state.lang === 'ar' ? 'الأسعار تبدأ من 18,000 ج.م، ولدينا سكن مشترك بـ 4,500 ج.م للفرد.' : 'Prices start at 18,000 EGP, co-living from 4,500 EGP/person.';
                
                state.isBotTyping = false;
                state.chatMessages.push({ sender: 'ai', text: reply });
                renderApp();
                setTimeout(() => { const el = document.getElementById('chat-messages'); if(el) el.scrollTop = el.scrollHeight; }, 50);
            }, 1000);
        };

        // --- UI Rendering ---
        const renderAmbientGlow = () => `
            <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none" style="will-change: transform; transform: translateZ(0);">
                <div class="absolute top-[0%] left-1/2 -translate-x-1/2 w-[90vw] max-w-[600px] h-[300px] rounded-full blur-[80px] transition-opacity duration-1000 opacity-60 ${state.isDark ? `bg-[${C.primary}]` : `bg-[${C.midBlue}]`}" style="animation: float 10s ease-in-out infinite"></div>
                <div class="absolute bottom-[10%] ${state.lang === 'ar' ? 'left-[-10%]' : 'right-[-10%]'} w-[50vw] h-[50vw] rounded-full blur-[120px] transition-opacity duration-1000 opacity-40 ${state.isDark ? `bg-[${C.darkBlue}]` : `bg-[${C.primary}]`}" style="animation: float 20s ease-in-out infinite reverse; animation-delay: 2s"></div>
            </div>
        `;

        const renderPwaPrompt = (theme) => {
            if (!state.showPwaPrompt) return '';
            return `
            <div class="w-full border ${theme.blurBg} px-4 py-2.5 rounded-2xl flex items-center gap-3 animate-fade-up shadow-sm mb-4">
                <div class="bg-white rounded-lg p-1.5 shadow-sm border border-gray-100 flex-shrink-0">
                    <img src="${mainLogoUrl}" class="w-7 h-7 object-contain" onerror="this.src='https://via.placeholder.com/30'">
                </div>
                <div class="flex-1">
                    <p class="font-bold text-sm ${theme.textMain} leading-none mb-1.5">${t('addToHome')}</p>
                    <p class="text-[11px] ${theme.textMuted} leading-tight">${t('addToHomeDesc')}</p>
                </div>
                <button onclick="window.installApp()" class="bg-gradient-to-r from-[${C.primary}] to-[${C.darkBlue}] text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-sm hover:scale-105 active:scale-95 transition-all flex-shrink-0">${t('addToHomeBtn')}</button>
                <button onclick="window.dismissPwa()" class="p-1 hover:bg-red-500/10 hover:text-red-500 rounded-full transition-colors flex-shrink-0 ml-1"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            `;
        };

        const renderHeader = (theme) => `
            <div class="fixed top-4 left-4 right-4 z-40 max-w-7xl mx-auto animate-fade-up">
                <div class="border ${theme.blurBg} rounded-[1.5rem] px-5 py-3 flex justify-between items-center transition-all duration-300 shadow-sm">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="window.navigateHome()">
                        <img src="${mainLogoUrl}" alt="Logo" class="h-10 w-auto" style="object-fit: contain;" onerror="this.src='https://via.placeholder.com/100x40'">
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="window.toggleLang()" class="w-10 h-10 rounded-xl flex items-center justify-center font-bold text-sm ${theme.btnBg} transition-colors hover:scale-105 active:scale-95">${state.lang === 'ar' ? 'EN' : 'AR'}</button>
                        <button onclick="window.toggleTheme()" class="w-10 h-10 rounded-xl flex items-center justify-center transition-colors hover:scale-105 active:scale-95 ${theme.btnBg}"><i data-lucide="${state.isDark ? 'sun' : 'moon'}" class="${state.isDark ? `text-[${C.softBlue}]` : `text-[${C.darkBlue}]`} w-5 h-5"></i></button>
                        <button onclick="window.toggleShowFavs()" class="relative w-10 h-10 rounded-xl flex items-center justify-center transition-all hover:scale-105 active:scale-95 ${state.showFavorites ? 'bg-red-500/10 border-red-500/30' : theme.btnBg}">
                            <i data-lucide="heart" class="w-5 h-5 ${state.showFavorites ? 'text-red-500 fill-red-500' : (state.isDark ? 'text-white' : `text-[${C.darkBlue}]`)}"></i>
                            ${state.favorites.length > 0 && !state.showFavorites ? `<span class="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 border border-[${state.isDark ? C.cardDark : 'white'}] rounded-full"></span>` : ''}
                        </button>
                    </div>
                </div>
            </div>
        `;

        const renderFooter = (theme) => `
            <footer dir="ltr" class="w-full pt-8 pb-6 mt-auto border-t flex flex-col items-center justify-center gap-2 relative z-10 ${state.isDark ? `border-white/5 bg-[${C.bgDark}]` : `border-[${C.borderLight}] bg-[${C.bgLight}]`}">
                <div class="flex items-center gap-2 mb-1">
                    <img src="${mainLogoUrl}" alt="Logo" class="h-8 w-auto" onerror="this.src='https://via.placeholder.com/100x40'">
                </div>
                <p class="text-sm ${theme.textMuted}">All rights reserved to <span class="font-bold text-[${C.primary}] mx-1">Saknk</span> &copy; ${new Date().getFullYear()}</p>
                <div class="text-xs mt-1 px-4 py-1.5 rounded-full ${state.isDark ? 'bg-white/5 text-gray-400' : 'bg-white text-gray-600 shadow-sm'} flex items-center gap-1.5 backdrop-blur-sm border ${state.isDark ? 'border-white/5' : `border-[${C.borderLight}]`}">
                    Developed by <span class="font-black bg-gradient-to-r from-[${C.primary}] to-[${C.darkBlue}] bg-clip-text text-transparent tracking-widest ml-1">ELNENX</span>
                </div>
            </footer>
        `;

        const renderHome = () => {
            const theme = getTheme();
            
            if (state.isLoading) {
                return `

                    </div>
                    <h2 class="text-xl font-bold leading-relaxed mb-4 ${theme.textMain}">${p.title?.[state.lang] || ''}</h2>
                    
                    <div class="flex flex-wrap gap-2 mb-5 pb-5 border-b border-gray-500/20">
                        ${(p.trustBadges?.[state.lang] || []).map(badge => `
                            <span class="text-xs font-bold px-3 py-1.5 rounded-lg border ${state.isDark ? `bg-[${C.darkBlue}]/30 text-[${C.softBlue}] border-[${C.darkBlue}]/50` : `bg-[${C.softBlue}]/30 text-[${C.darkBlue}] border-[${C.softBlue}]`}">${badge}</span>
                        `).join('')}
                    </div>

                    <div class="flex flex-wrap items-center gap-3 mb-5">
                        <div class="flex items-center gap-2 px-3.5 py-2 rounded-xl border ${state.isDark ? `bg-black/40 border-[${C.primary}]/30 text-gray-200` : `bg-[${C.primary}]/10 border-[${C.primary}]/20 text-gray-800`}">
                            <i data-lucide="graduation-cap" class="w-4 h-4 text-[${C.primary}]"></i><span class="text-sm font-bold">${genderLabel}</span>
                        </div>
                        ${p.occupancy ? `
                        <div class="flex items-center gap-2 px-3.5 py-2 rounded-xl border ${state.isDark ? `bg-black/40 border-[${C.primary}]/30 text-gray-200` : `bg-[${C.primary}]/10 border-[${C.primary}]/20 text-gray-800`}">
                            <i data-lucide="users" class="w-4 h-4 text-[${C.primary}]"></i><span class="text-sm font-bold"><span class="text-[${C.primary}]">${p.occupancy.current}</span> / ${p.occupancy.total} ${t('occupants')}</span>
                        </div>` : ''}
                    </div>
                    
                    <div class="grid grid-cols-3 gap-3">
                        <div class="flex flex-col items-center justify-center border py-4 rounded-2xl ${state.isDark ? 'bg-black/40 border-white/5' : `bg-gray-50 border-[${C.borderLight}]`}"><i data-lucide="bed" class="w-5 h-5 text-[${C.primary}] mb-2"></i><span class="text-xl font-bold ${theme.textMain}">${p.beds || 0}</span><span class="text-[11px] uppercase tracking-wide mt-1 ${theme.textMuted}">${t('beds')}</span></div>
                        <div class="flex flex-col items-center justify-center border py-4 rounded-2xl ${state.isDark ? 'bg-black/40 border-white/5' : `bg-gray-50 border-[${C.borderLight}]`}"><i data-lucide="bath" class="w-5 h-5 text-[${C.primary}] mb-2"></i><span class="text-xl font-bold ${theme.textMain}">${p.baths || 0}</span><span class="text-[11px] uppercase tracking-wide mt-1 ${theme.textMuted}">${t('baths')}</span></div>
                        <div class="flex flex-col items-center justify-center border py-4 rounded-2xl ${state.isDark ? 'bg-black/40 border-white/5' : `bg-gray-50 border-[${C.borderLight}]`}"><i data-lucide="maximize" class="w-5 h-5 text-[${C.primary}] mb-2"></i><span class="text-xl font-bold ${theme.textMain}">${p.area || 0}</span><span class="text-[11px] uppercase tracking-wide mt-1 ${theme.textMuted}">${t('area')}</span></div>
                    </div>
                </div>

                <div class="animate-fade-up w-full">
                    <h3 class="text-xl font-bold mb-4 ${theme.textMain}">${t('neighborhood')}</h3>
                    <div class="rounded-[2rem] border overflow-hidden ${theme.cardBg}">
                        <div class="relative h-48 w-full bg-[${C.bgDark}]">
                            <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" loading="lazy" class="w-full h-full object-cover opacity-50 mix-blend-overlay" onerror="this.src='https://via.placeholder.com/800'">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <div class="w-12 h-12 bg-[${C.primary}]/20 rounded-full flex items-center justify-center animate-pulse">
                                    <div class="w-8 h-8 bg-[${C.primary}] rounded-full flex items-center justify-center shadow-lg"><i data-lucide="map-pin" class="w-4 h-4 text-white"></i></div>
                                </div>
                            </div>
                        </div>
                        <div class="p-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                ${(p.pois || []).map(poi => `
                                    <div class="flex items-center justify-between p-3 rounded-xl border ${state.isDark ? 'bg-black/30 border-white/5' : 'bg-gray-50 border-gray-100'}">
                                        <div class="flex items-center gap-3">
                                            <div class="p-2 rounded-lg ${state.isDark ? 'bg-white/5' : 'bg-white shadow-sm'}"><i data-lucide="${poi.icon}" class="w-4 h-4 text-[${C.primary}]"></i></div>
                                            <span class="text-sm font-bold ${theme.textMain}">${poi[state.lang]}</span>
                                        </div>
                                        <span class="text-xs font-bold px-2 py-1 rounded-md ${state.isDark ? `bg-white/5 text-[${C.primary}]` : `bg-[${C.softBlue}] text-[${C.darkBlue}]`}">${poi.time}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="animate-fade-up w-full">
                    <h3 class="text-xl font-bold mb-4 ${theme.textMain}">${t('amenities')}</h3>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                        ${(p.features?.[state.lang] || []).map(f => `
                            <div class="flex flex-col items-center justify-center p-4 rounded-2xl border ${theme.cardBg}">
                                <i data-lucide="${getFeatureIcon(f)}" class="w-5 h-5 text-[${C.primary}] mb-2"></i>
                                <span class="text-sm font-bold ${theme.textMain} text-center">${f}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div id="dock-target" class="w-full h-1 mt-4"></div>

                <div id="dock-content" class="fixed bottom-6 left-4 sm:left-6 right-4 sm:right-6 max-w-4xl mx-auto transition-all duration-300 z-50">
                    <div class="border ${theme.blurBg} p-2.5 rounded-3xl flex gap-2 shadow-sm">
                        <button class="flex-1 bg-[#25D366] text-white py-3.5 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-[#25D366]/20 hover:scale-[1.02] active:scale-95 transition-all">
                            <i data-lucide="message-circle" class="w-5 h-5"></i><span>${t('whatsapp')}</span>
                        </button>
                        <button class="flex-1 bg-gradient-to-r from-[${C.primary}] to-[${C.darkBlue}] text-white py-3.5 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-[${C.primary}]/30 hover:scale-[1.02] active:scale-95 transition-all">
                            <i data-lucide="phone" class="w-5 h-5"></i><span>${t('callNow')}</span>
                        </button>
                    </div>
                </div>

                <div class="animate-fade-up w-full mt-4">
                    <div class="border rounded-2xl p-5 flex items-center justify-between shadow-lg ${state.isDark ? `border-white/5 bg-gradient-to-r from-[${C.cardDark}] to-[${C.bgDark}]` : `border-[${C.borderLight}] bg-white`}">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-black rounded-full flex items-center justify-center border-2 border-[${C.primary}] p-1 relative">
                                <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(p.agent?.name || 'Agent')}&background=152033&color=638ECB" class="w-full h-full rounded-full" onerror="this.src='https://via.placeholder.com/50'"/>
                            </div>
                            <div>
                                <div class="flex items-center gap-1.5 mb-1">
                                    <h4 class="font-bold text-base ${theme.textMain}">${p.agent?.name || ''}</h4>
                                    ${p.agent?.verified ? '<i data-lucide="check-circle-2" class="w-4 h-4 text-[#10B981]"></i>' : ''}
                                </div>
                                <div class="flex items-center gap-1 text-xs font-medium ${theme.textMuted}">
                                    <i data-lucide="shield-check" class="w-3.5 h-3.5 text-[${C.primary}]"></i><span>${t('verifiedAgent')}</span>
                                </div>
                            </div>
                        </div>
                        <div class="p-2 rounded-xl text-center border ${state.isDark ? 'bg-white/5 border-white/5' : `bg-gray-50 border-[${C.borderLight}]`}">
                            <span class="flex items-center gap-1 text-sm font-bold ${theme.textMain}"><i data-lucide="star" class="w-3 h-3 text-yellow-500 fill-yellow-500"></i> ${p.agent?.rate || '5.0'}</span>
                        </div>
                    </div>
                </div>
                
                <div class="animate-fade-up w-full">
                    <h3 class="text-xl font-bold mb-4 ${theme.textMain}">${t('propertyDetails')}</h3>
                    <p class="text-sm leading-loose ${theme.textMuted}">${t('description')}</p>
                </div>

                ${recommendedHTML}
            </main>
            `;
        };

        const renderApp = () => {
            const theme = getTheme();
            document.body.className = `${theme.bgMain} ${theme.textMain} transition-colors duration-500 min-h-screen flex flex-col m-0 p-0`;
            
            const app = document.getElementById('app');
            app.innerHTML = `
                ${renderAmbientGlow()}
                ${!state.selectedPropertyId ? renderHeader(theme) : ''}
                ${!state.selectedPropertyId ? renderHome() : renderPropertyDetails()}
                ${renderFooter(theme)}
                ${renderChatbot()}
            `;
            
            setTimeout(() => {
                if(window.lucide) window.lucide.createIcons();
            }, 0);

            // نظام تتبع الاسكرول لشريط التواصل 
            const target = document.getElementById('dock-target');
            const content = document.getElementById('dock-content');
            
            if (target && content) {
                window.onscroll = null;
                
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            content.className = "relative transition-all duration-300 z-50 mt-4";
                        } else {
                            content.className = "fixed bottom-6 left-4 sm:left-6 right-4 sm:right-6 max-w-4xl mx-auto transition-all duration-300 z-50";
                        }
                    });
                }, { 
                    root: null, 
                    threshold: 0,
                    rootMargin: '0px 0px 50px 0px'
                });
                
                observer.observe(target);
            }
        };

        // --- Init ---
        renderApp(); 
        fetchProperties(); 
    </script>
</body>
</html>
